name: Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: estoque_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/estoque_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inicializar banco de testes
        run: psql $DATABASE_URL -f estoque-incenso/backend/src/db/schema.sql

      - name: Instalar dependências do backend
        working-directory: estoque-incenso/backend
        run: npm ci

      - name: Rodar testes
        working-directory: estoque-incenso/backend
        run: npm test

      - name: Instalar dependências do frontend
        working-directory: estoque-incenso/frontend
        run: npm ci --include=dev

      - name: Build Angular
        working-directory: estoque-incenso/frontend
        run: npm run build

      - name: Trigger Render Deploy Hook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render Deploy Hook status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Render Deploy Hook falhou com status $STATUS"
            exit 1
          fi
